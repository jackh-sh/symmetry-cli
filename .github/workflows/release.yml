name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # keyring's sync-secret-service backend links against libdbus.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            *windows*) bin="symmetry.exe" ;;
            *) bin="symmetry" ;;
          esac
          asset="symmetry-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" "$bin"
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: symmetry-${{ matrix.target }}
          path: |
            symmetry-*.tar.gz
            symmetry-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      # SSH-sign each checksum file so installers can verify the release came
      # from this project's key, not just that the download arrived intact.
      # The matching public key is pinned in scripts/install.sh and install.ps1.
      - name: Sign checksums
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::warning::RELEASE_SIGNING_KEY is not set; publishing unsigned release"
            exit 0
          fi
          umask 077
          printf '%s\n' "$SIGNING_KEY" > signing_key
          for f in symmetry-*.tar.gz.sha256; do
            ssh-keygen -Y sign -f signing_key -n symmetry-release "$f"
          done
          rm -f signing_key

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            symmetry-*.tar.gz
            symmetry-*.tar.gz.sha256
            symmetry-*.tar.gz.sha256.sig
